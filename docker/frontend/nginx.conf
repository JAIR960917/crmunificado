server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net https://www.googletagmanager.com https://www.google-analytics.com https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://api.joonker.com.br https://www.facebook.com https://connect.facebook.net https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://*.stape.co; img-src 'self' data: blob: https:; frame-src https://www.facebook.com https://www.google.com; frame-ancestors 'none';" always;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # runtime-config.js never cached — it's regenerated by deploy.sh on the VPS
  location = /runtime-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
    try_files $uri =404;
  }

  # Service worker never cached
  location = /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
    try_files $uri =404;
  }
  location = /service-worker.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
    try_files $uri =404;
  }
  location = /sw-custom.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
    try_files $uri =404;
  }
  location = /registerSW.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    default_type application/manifest+json;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
    try_files $uri =404;
  }

  # Hashed assets — cache forever
  # IMPORTANTE: sempre tente o arquivo atual primeiro.
  # O histórico serve apenas como fallback para hashes antigos ainda em cache no navegador.
  location ~ ^/assets/index-.*\.js$ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri /.asset-history$uri /.asset-history/assets/index-latest.js =404;
  }

  location ~ ^/assets/index-.*\.css$ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri /.asset-history$uri /.asset-history/assets/index-latest.css =404;
  }

  location /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri /.asset-history$uri =404;
  }

  # Páginas legais estáticas (Meta/WhatsApp validam sem executar JavaScript do SPA)
  location = /exclusao-dados {
    default_type text/html;
    try_files /exclusao-dados/index.html =404;
  }
  location = /privacidade {
    default_type text/html;
    try_files /privacidade/index.html =404;
  }
  location = /termos {
    default_type text/html;
    try_files /termos/index.html =404;
  }
  location = /campanha-copa {
    default_type text/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net https://www.googletagmanager.com https://www.google-analytics.com https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://api.joonker.com.br https://www.facebook.com https://connect.facebook.net https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://*.stape.co; img-src 'self' data: blob: https:; frame-src https://www.facebook.com https://www.google.com; frame-ancestors 'none';" always;
    try_files /campanha-copa/index.html =404;
  }
  location /campanha-copa/ {
    try_files $uri $uri/ =404;
  }
  location = /links {
    default_type text/html;
    try_files /links/index.html =404;
  }
  location /links/ {
    try_files $uri $uri/ =404;
  }

  # SPA fallback: client-side routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Disable caching of index.html itself so new builds are picked up
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
  }
}
